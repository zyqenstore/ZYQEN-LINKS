<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width,
             initial-scale=1.0,
             minimum-scale=1.0,
             maximum-scale=1.0,
             user-scalable=no,
             viewport-fit=cover">

  <title>Zyqen Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    button{
      touch-action:manipulation;
    }

    html{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
    }

    body{
      font-family:"Poppins",sans-serif;
      min-height:100vh;
      min-height:100dvh;
      background:
        radial-gradient(circle at top left,rgba(248,213,122,.22),transparent 34%),
        radial-gradient(circle at bottom right,rgba(184,134,11,.18),transparent 34%),
        #070707;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:18px;
      overscroll-behavior:none;
    }

    .bg{
      position:fixed;
      inset:0;
      background:linear-gradient(120deg,rgba(255,215,120,.06),transparent,rgba(255,215,120,.03));
      backdrop-filter:blur(10px);
      pointer-events:none;
    }

    .login-card{
      position:relative;
      width:100%;
      max-width:410px;
      padding:36px;
      border-radius:30px;
      background:rgba(255,255,255,.065);
      border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(24px);
      box-shadow:0 0 50px rgba(255,215,120,.1),0 25px 80px rgba(0,0,0,.55);
      z-index:2;
      text-align:center;
      animation:fade .7s ease;
    }

    @keyframes fade{
      from{opacity:0;transform:translateY(22px)}
      to{opacity:1;transform:translateY(0)}
    }

.logo img{
  width:50%;
  height:50%;
  object-fit:cover;
  border-radius:50%;
  user-select:none;
  pointer-events:none;
}

    h1{
      font-size:32px;
      margin-bottom:10px;
      line-height:1.1;
    }

    p{
      color:#cfcfcf;
      line-height:1.6;
      margin-bottom:28px;
      font-size:15px;
    }

    .login-btn{
      width:100%;
      height:56px;
      border:none;
      border-radius:17px;
      background:linear-gradient(135deg,#ffd86b,#b8860b);
      color:#111;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.25s;
      box-shadow:0 12px 35px rgba(255,215,120,.25);
    }

    .login-btn:hover{
      transform:translateY(-2px) scale(1.01);
      box-shadow:0 18px 45px rgba(255,215,120,.35);
    }

    .status{
      margin-top:18px;
      color:#ffb3b3;
      font-size:13px;
      min-height:20px;
    }

    @media(max-width:480px){
      body{
        padding:14px;
      }

      .login-card{
        max-width:360px;
        padding:28px 22px;
        border-radius:24px;
      }

      .logo{
        width:70px;
        height:70px;
        font-size:31px;
        margin-bottom:18px;
      }

      h1{
        font-size:25px;
      }

      p{
        font-size:13px;
        margin-bottom:24px;
      }

      .login-btn{
        height:52px;
        font-size:14px;
        border-radius:15px;
      }

      .status{
        font-size:12px;
      }
    }

    @media(max-width:360px){
      .login-card{
        padding:24px 18px;
        border-radius:22px;
      }

      .logo{
        width:62px;
        height:62px;
        font-size:28px;
      }

      h1{
        font-size:22px;
      }

      p{
        font-size:12px;
      }

      .login-btn{
        height:48px;
        font-size:13px;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="login-card">
    <div class="logo">

  <img
    src="Icones/Image/Z.png"
    alt="Zyqen"
    draggable="false">

</div>
    <h1>Zyqen Admin</h1>
    <p>Painel privado da Zyqen Links</p>

    <button id="loginBtn" class="login-btn">Entrar com Google</button>
    <div id="status" class="status"></div>
  </div>

  <script type="module">
    import { auth, provider, ADMIN_EMAIL } from "./firebase.js";

    import {
      signInWithPopup,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const loginBtn = document.getElementById("loginBtn");
    const status = document.getElementById("status");

    loginBtn.addEventListener("click", async () => {
      try{
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        if(user.email !== ADMIN_EMAIL){
          status.innerHTML = "Acesso negado.";
          await signOut(auth);
          return;
        }

        status.innerHTML = "Entrando no painel...";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 800);

      }catch(error){
        console.error(error);
        status.innerHTML = "Erro ao entrar.";
      }
    });

    onAuthStateChanged(auth,(user)=>{
      if(!user) return;

      if(user.email === ADMIN_EMAIL){
        window.location.href = "dashboard.html";
      }
    });

    document.addEventListener("wheel", (e) => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
      }
    }, { passive:false });

    document.addEventListener("keydown", (e) => {
      const blockedKeys = ["+", "-", "=", "0"];

      if ((e.ctrlKey || e.metaKey) && blockedKeys.includes(e.key)) {
        e.preventDefault();
      }
    });

    document.addEventListener("gesturestart", (e) => {
      e.preventDefault();
    });

    document.addEventListener("gesturechange", (e) => {
      e.preventDefault();
    });

    document.addEventListener("gestureend", (e) => {
      e.preventDefault();
    });

    let lastTouchEnd = 0;

    document.addEventListener("touchend", (e) => {
      const now = Date.now();

      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }

      lastTouchEnd = now;
    }, { passive:false });
  </script>
</body>
</html>
