<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width,
             initial-scale=1.0,
             minimum-scale=1.0,
             maximum-scale=1.0,
             user-scalable=no,
             viewport-fit=cover">

  <title>Zyqen Admin Dashboard</title>

  <link rel="manifest" href="manifest-admin.json">
  <link rel="icon" type="image/png" href="Icones/Image/Z.png">
  <link rel="apple-touch-icon" href="Icones/Image/Z.png">

  <meta name="theme-color" content="#070707">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Zyqen Admin">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    :root{
      --bg:#070707;
      --card:rgba(255,255,255,.055);
      --card2:rgba(255,255,255,.03);
      --line:rgba(255,255,255,.1);
      --gold:#ffd86b;
      --gold2:#b8860b;
      --text:#fff;
      --muted:#aaa;
      --danger:#ff5757;
      --radius:22px;
    }

    html{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overscroll-behavior:none;
    }

    body{
      font-family:"Poppins",sans-serif;
      background:
        radial-gradient(circle at top left,rgba(255,216,107,.13),transparent 32%),
        radial-gradient(circle at bottom right,rgba(184,134,11,.11),transparent 34%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      min-height:100dvh;
      overflow-x:hidden;
      overscroll-behavior:none;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.023) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.023) 1px,transparent 1px);
      background-size:64px 64px;
      pointer-events:none;
      z-index:-1;
      opacity:.8;
    }

    button,input{
      font-family:inherit;
    }

    button{
      cursor:pointer;
      border:none;
    }

    .dashboard{
      display:grid;
      grid-template-columns:280px 1fr;
      min-height:100vh;
      min-height:100dvh;
    }

    aside{
      border-right:1px solid var(--line);
      background:rgba(0,0,0,.28);
      backdrop-filter:blur(22px);
      padding:24px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:sticky;
      top:0;
      height:100vh;
      height:100dvh;
      z-index:20;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:42px;
    }

    .brand-icon{
      width:54px;
      height:54px;
      border-radius:18px;
      background:linear-gradient(135deg,rgba(255,216,107,.18),rgba(184,134,11,.06));
      border:1px solid rgba(255,216,107,.32);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--gold);
      font-size:28px;
      font-weight:800;
      box-shadow:0 0 28px rgba(255,216,107,.12);
      flex-shrink:0;
      user-select:none;
    }

    .brand h1{
      font-size:23px;
      line-height:1;
    }

    .brand span{
      color:var(--gold);
      font-size:11px;
      letter-spacing:3px;
      font-weight:700;
    }

    nav{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .nav-item{
      height:52px;
      border-radius:16px;
      display:flex;
      align-items:center;
      gap:12px;
      padding:0 16px;
      color:#cfcfcf;
      font-size:14px;
      background:transparent;
      border:1px solid transparent;
      cursor:pointer;
      transition:.25s;
      user-select:none;
    }

    .nav-item:hover{
      background:rgba(255,255,255,.04);
    }

    .nav-item.active{
      color:var(--gold);
      background:linear-gradient(90deg,rgba(255,216,107,.18),rgba(255,216,107,.04));
      border-color:rgba(255,216,107,.18);
    }

    .admin-box{
      border:1px solid var(--line);
      border-radius:18px;
      padding:15px;
      background:rgba(255,255,255,.04);
      margin-bottom:14px;
    }

    .admin-name{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
    }

    .admin-mini{
      width:38px;
      height:38px;
      border-radius:14px;
      border:1px solid var(--gold);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--gold);
      font-weight:800;
      flex-shrink:0;
    }

    .admin-email{
      font-size:11px;
      color:var(--muted);
      margin-top:6px;
      word-break:break-all;
    }

    .logout{
      width:100%;
      height:50px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      color:#fff;
      border:1px solid var(--line);
      font-weight:700;
      transition:.25s;
    }

    .logout:hover{
      background:rgba(255,92,92,.12);
      border-color:rgba(255,92,92,.35);
      color:#ffb3b3;
    }

    main{
      padding:30px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:28px;
    }

    .page-title h2{
      font-size:30px;
      line-height:1.1;
      font-weight:800;
    }

    .page-title p{
      color:var(--muted);
      margin-top:7px;
      font-size:14px;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .search{
      width:300px;
      height:50px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      color:#fff;
      padding:0 17px;
      outline:none;
      font-size:14px;
    }

    .mobile-menu,
    .install-btn{
      width:50px;
      height:50px;
      border-radius:16px;
      background:rgba(255,255,255,.055);
      color:#fff;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.25s;
      flex-shrink:0;
    }

    .mobile-menu{
      display:none;
      font-size:22px;
    }

    .install-btn{
      display:none;
    }

    .install-btn img{
      width:22px;
      height:22px;
      object-fit:contain;
      filter:brightness(0) invert(1);
    }

    .mobile-menu:hover,
    .install-btn:hover{
      transform:translateY(-2px);
      border-color:rgba(255,216,107,.25);
    }

    .content-grid{
      display:grid;
      grid-template-columns:minmax(320px,410px) 1fr;
      gap:20px;
      align-items:start;
    }

    .single-grid{
      grid-template-columns:1fr;
    }

    .card{
      background:linear-gradient(145deg,var(--card),var(--card2));
      border:1px solid var(--line);
      border-radius:var(--radius);
      backdrop-filter:blur(22px);
      box-shadow:0 24px 80px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .card-header{
      padding:22px;
      border-bottom:1px solid rgba(255,255,255,.07);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .card-title{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:19px;
      font-weight:800;
    }

    .badge{
      padding:4px 9px;
      border-radius:999px;
      background:rgba(255,216,107,.16);
      color:var(--gold);
      font-size:12px;
      font-weight:800;
    }

    .form{
      padding:22px;
    }

    label{
      display:block;
      font-size:13px;
      margin-bottom:8px;
      color:#eee;
      font-weight:600;
    }

    .field{
      margin-bottom:18px;
    }

    input{
      width:100%;
      height:50px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.11);
      background:rgba(0,0,0,.25);
      color:white;
      outline:none;
      padding:0 15px;
      transition:.2s;
      font-size:14px;
    }

    input:focus{
      border-color:rgba(255,216,107,.55);
      box-shadow:0 0 0 4px rgba(255,216,107,.08);
    }

    input::placeholder{
      color:#777;
    }

    .add{
      width:100%;
      height:54px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#111;
      font-size:15px;
      font-weight:900;
      transition:.25s;
      box-shadow:0 14px 34px rgba(255,216,107,.18);
    }

    .add:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 42px rgba(255,216,107,.28);
    }

    .hint{
      margin-top:16px;
      color:#8d8d8d;
      font-size:12px;
      line-height:1.5;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
      padding:22px;
    }

    .stat-card{
      padding:20px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.045);
    }

    .stat-card span{
      color:var(--muted);
      font-size:13px;
    }

    .stat-card strong{
      display:block;
      margin-top:7px;
      font-size:30px;
      color:var(--gold);
    }

    .products-list{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:11px;
      max-height:none;
      overflow:visible;
    }

    .product{
      display:grid;
      grid-template-columns:66px 1fr auto;
      align-items:center;
      gap:14px;
      padding:12px;
      border-radius:18px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.07);
      transition:.25s;
    }

    .product:hover{
      background:rgba(255,255,255,.075);
      transform:translateY(-2px);
    }

    .thumb{
      width:66px;
      height:66px;
      border-radius:15px;
      object-fit:cover;
      background:#111;
      border:1px solid rgba(255,255,255,.08);
    }

    .product strong{
      display:block;
      font-size:15px;
      margin-bottom:4px;
      line-height:1.25;
    }

    .product span{
      color:var(--gold);
      font-size:13px;
      font-weight:800;
    }

    .product small{
      display:block;
      color:#888;
      margin-top:4px;
      max-width:360px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .product-actions{
      display:flex;
      gap:8px;
    }

    .icon-btn{
      width:40px;
      height:40px;
      border-radius:13px;
      color:#fff;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      transition:.2s;
      font-size:16px;
    }

    .icon-btn:hover{
      background:rgba(255,216,107,.12);
      color:var(--gold);
    }

    .delete:hover{
      background:rgba(255,92,92,.14);
      color:#ff8f8f;
      border-color:rgba(255,92,92,.25);
    }

    .empty{
      text-align:center;
      padding:42px 18px;
      color:#999;
      font-size:13px;
    }

    .toast{
      position:fixed;
      right:22px;
      bottom:22px;
      background:rgba(10,10,10,.9);
      border:1px solid rgba(255,216,107,.25);
      color:#fff;
      padding:13px 17px;
      border-radius:16px;
      box-shadow:0 18px 50px rgba(0,0,0,.45);
      transform:translateY(20px);
      opacity:0;
      pointer-events:none;
      transition:.25s;
      z-index:999;
      font-size:13px;
    }

    .toast.show{
      transform:translateY(0);
      opacity:1;
    }

    .bottom-nav{
      display:none;
    }

    .mobile-drawer{
      display:none;
    }

    .drawer-overlay{
      display:none;
    }

    @media(max-width:1100px){
      .dashboard{
        grid-template-columns:1fr;
      }

      aside{
        display:none;
      }

      main{
        padding:18px;
      }

      .mobile-menu{
        display:flex;
      }

      .content-grid{
        grid-template-columns:1fr;
      }

      .search{
        width:220px;
      }
    }

    @media(max-width:720px){
      body{
        background:
          radial-gradient(circle at top left,rgba(255,216,107,.16),transparent 30%),
          radial-gradient(circle at bottom right,rgba(184,134,11,.10),transparent 36%),
          #070707;
      }

      main{
        padding:12px 10px 84px;
      }

      .topbar{
        align-items:center;
        gap:10px;
        margin-bottom:14px;
      }

      .page-title{
        flex:1;
        min-width:0;
      }

      .page-title h2{
        font-size:21px;
        line-height:1.05;
      }

      .page-title p{
        font-size:11px;
        margin-top:4px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
      }

      .top-actions{
        gap:8px;
      }

      .search,
      .top-actions .brand-icon{
        display:none;
      }

      .mobile-menu,
      .install-btn{
        width:44px;
        height:44px;
        border-radius:14px;
      }

      .install-btn img{
        width:20px;
        height:20px;
      }

      .content-grid{
        gap:12px;
      }

      .card{
        border-radius:19px;
      }

      .card-header{
        padding:15px;
      }

      .card-title{
        font-size:16px;
      }

      .form{
        padding:14px;
      }

      .field{
        margin-bottom:12px;
      }

      label{
        font-size:12px;
        margin-bottom:6px;
      }

      input{
        height:42px;
        font-size:12px;
        border-radius:12px;
        padding:0 13px;
      }

      .add{
        height:47px;
        font-size:13px;
        border-radius:14px;
      }

      .hint{
        font-size:10.5px;
        margin-top:12px;
      }

      .stats-grid{
        grid-template-columns:1fr;
        padding:13px;
        gap:10px;
      }

      .stat-card{
        padding:14px;
        border-radius:16px;
      }

      .stat-card strong{
        font-size:24px;
      }

      .products-list{
        padding:10px;
        gap:9px;
      }

      .product{
        grid-template-columns:50px 1fr auto;
        gap:9px;
        padding:9px;
        border-radius:15px;
      }

      .thumb{
        width:50px;
        height:50px;
        border-radius:12px;
      }

      .product strong{
        font-size:12.5px;
        line-height:1.25;
        display:-webkit-box;
        -webkit-line-clamp:2;
        -webkit-box-orient:vertical;
        overflow:hidden;
      }

      .product span{
        font-size:11px;
      }

      .product small{
        display:none;
      }

      .product-actions{
        gap:5px;
      }

      .icon-btn{
        width:32px;
        height:32px;
        border-radius:10px;
        font-size:13px;
      }

      .bottom-nav{
        position:fixed;
        left:10px;
        right:10px;
        bottom:10px;
        height:58px;
        border-radius:20px;
        background:rgba(15,15,15,.88);
        border:1px solid rgba(255,255,255,.1);
        backdrop-filter:blur(24px);
        display:grid;
        grid-template-columns:repeat(4,1fr);
        z-index:50;
        box-shadow:0 20px 70px rgba(0,0,0,.45);
      }

      .bottom-nav div{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:2px;
        color:#999;
        font-size:10px;
        cursor:pointer;
        user-select:none;
      }

      .bottom-nav .active{
        color:var(--gold);
      }

      .drawer-overlay{
        display:block;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.55);
        opacity:0;
        pointer-events:none;
        transition:.25s;
        z-index:80;
      }

      .drawer-overlay.show{
        opacity:1;
        pointer-events:auto;
      }

      .mobile-drawer{
        display:flex;
        position:fixed;
        top:0;
        left:0;
        width:min(82vw,320px);
        height:100vh;
        height:100dvh;
        background:rgba(12,12,12,.96);
        border-right:1px solid rgba(255,255,255,.1);
        backdrop-filter:blur(26px);
        z-index:90;
        padding:20px;
        flex-direction:column;
        justify-content:space-between;
        transform:translateX(-105%);
        transition:.28s ease;
      }

      .mobile-drawer.show{
        transform:translateX(0);
      }

      .drawer-close{
        width:42px;
        height:42px;
        border-radius:14px;
        background:rgba(255,255,255,.06);
        color:#fff;
        border:1px solid var(--line);
        font-size:20px;
      }

      .drawer-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin-bottom:24px;
      }

      .drawer-user{
        margin-bottom:20px;
        padding:14px;
        border-radius:18px;
        background:rgba(255,255,255,.045);
        border:1px solid var(--line);
      }

      .drawer-user strong{
        display:block;
        font-size:14px;
      }

      .drawer-user span{
        color:var(--muted);
        font-size:11px;
        word-break:break-all;
      }

      .drawer-logout{
        height:50px;
        border-radius:16px;
        background:rgba(255,87,87,.08);
        border:1px solid rgba(255,87,87,.3);
        color:#ff9a9a;
        font-weight:800;
      }
    }

    @media(max-width:380px){
      main{
        padding:10px 8px 80px;
      }

      .page-title h2{
        font-size:19px;
      }

      .page-title p{
        font-size:10px;
      }

      .mobile-menu,
      .install-btn{
        width:40px;
        height:40px;
        border-radius:13px;
      }

      .card-header{
        padding:13px;
      }

      .form{
        padding:13px;
      }

      input{
        height:40px;
      }

      .product{
        grid-template-columns:46px 1fr auto;
        gap:8px;
        padding:8px;
      }

      .thumb{
        width:46px;
        height:46px;
      }

      .product strong{
        font-size:12px;
      }

      .icon-btn{
        width:30px;
        height:30px;
      }

      .bottom-nav{
        height:56px;
      }
    }
  </style>
</head>

<body>

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <div class="mobile-drawer" id="mobileDrawer">
    <div>
      <div class="drawer-head">
        <div class="brand" style="margin-bottom:0;">
          <div class="brand-icon">Z</div>
          <div>
            <h1>ZYQEN</h1>
            <span>ADMIN</span>
          </div>
        </div>

        <button class="drawer-close" id="drawerClose">×</button>
      </div>

      <div class="drawer-user">
        <strong>Zyqen Admin</strong>
        <span id="drawerEmail">admin</span>
      </div>

      <nav>
        <div class="nav-item" data-page="overview">⌂ Visão Geral</div>
        <div class="nav-item active" data-page="products">▱ Produtos</div>
        <div class="nav-item" data-page="studio">🎨 Studio</div>
        <div class="nav-item" data-page="stats">▥ Estatísticas</div>
        <div class="nav-item" data-page="settings">⚙ Configurações</div>
      </nav>
    </div>

    <button class="drawer-logout" id="drawerLogoutBtn">Sair da conta</button>
  </div>

  <div class="dashboard">
    <aside>
      <div>
        <div class="brand">
          <div class="brand-icon">Z</div>
          <div>
            <h1>ZYQEN</h1>
            <span>DASHBOARD</span>
          </div>
        </div>

        <nav>
          <div class="nav-item" data-page="overview">⌂ Visão Geral</div>
          <div class="nav-item active" data-page="products">▱ Produtos</div>
          <div class="nav-item" data-page="stats">▥ Estatísticas</div>
          <div class="nav-item" data-page="settings">⚙ Configurações</div>
        </nav>
      </div>

      <div>
        <div class="admin-box">
          <div class="admin-name">
            <div class="admin-mini">Z</div>
            <div>Zyqen Admin</div>
          </div>
          <div class="admin-email" id="adminEmail">admin</div>
        </div>

        <button class="logout" id="logoutBtn">Sair</button>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <button class="mobile-menu" id="mobileMenuBtn">☰</button>

        <div class="page-title">
          <h2>Produtos</h2>
          <p>Gerencie os produtos da sua página</p>
        </div>

        <div class="top-actions">
          <input class="search" id="searchInput" placeholder="Buscar produto...">

          <button class="install-btn" id="installBtn" type="button">
            <img
              src="Icones/Icon/download.svg"
              alt=""
              draggable="false">
          </button>

          <div class="brand-icon" style="width:52px;height:52px;font-size:24px;">Z</div>
        </div>
      </div>

      <div class="content-grid" id="contentGrid"></div>
    </main>
  </div>

  <div class="bottom-nav">
    <div data-page="overview">⌂<span>Início</span></div>
    <div class="active" data-page="products">▱<span>Produtos</span></div>
    <div data-page="studio">🎨<span>Studio</span></div>
    <div data-page="stats">▥<span>Stats</span></div>
    <div data-page="settings">⚙<span>Config.</span></div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { auth, db, ADMIN_EMAIL } from "./firebase.js";

    import {
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const logoutBtn = document.getElementById("logoutBtn");
    const drawerLogoutBtn = document.getElementById("drawerLogoutBtn");
    const contentGrid = document.getElementById("contentGrid");
    const searchInput = document.getElementById("searchInput");
    const toast = document.getElementById("toast");
    const adminEmail = document.getElementById("adminEmail");
    const drawerEmail = document.getElementById("drawerEmail");
    const pageTitle = document.querySelector(".page-title h2");
    const pageSubtitle = document.querySelector(".page-title p");
    const navItems = document.querySelectorAll("[data-page]");

    const mobileMenuBtn = document.getElementById("mobileMenuBtn");
    const mobileDrawer = document.getElementById("mobileDrawer");
    const drawerOverlay = document.getElementById("drawerOverlay");
    const drawerClose = document.getElementById("drawerClose");

    let allProducts = [];
    let currentPage = "products";

    function showToast(message){
      toast.textContent = message;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function openDrawer(){
      mobileDrawer.classList.add("show");
      drawerOverlay.classList.add("show");
    }

    function closeDrawer(){
      mobileDrawer.classList.remove("show");
      drawerOverlay.classList.remove("show");
    }

    mobileMenuBtn.addEventListener("click", openDrawer);
    drawerClose.addEventListener("click", closeDrawer);
    drawerOverlay.addEventListener("click", closeDrawer);

    function setActivePage(page){
      navItems.forEach(item => {
        item.classList.toggle("active", item.dataset.page === page);
      });
    }

    function afterPageChange(){
      closeDrawer();
      window.scrollTo({ top:0, behavior:"smooth" });
    }

    function renderOverview(){
      currentPage = "overview";
      setActivePage("overview");
      pageTitle.textContent = "Visão Geral";
      pageSubtitle.textContent = "Resumo rápido do painel";
      searchInput.style.display = "none";
      contentGrid.className = "content-grid single-grid";

      contentGrid.innerHTML = `
        <section class="card">
          <div class="card-header">
            <div class="card-title">⌂ Resumo</div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <span>Produtos cadastrados</span>
              <strong>${allProducts.length}</strong>
            </div>

            <div class="stat-card">
              <span>Página pública</span>
              <strong>ON</strong>
            </div>

            <div class="stat-card">
              <span>Banco Firestore</span>
              <strong>OK</strong>
            </div>
          </div>
        </section>
      `;

      afterPageChange();
    }

    function renderStats(){
      currentPage = "stats";
      setActivePage("stats");
      pageTitle.textContent = "Estatísticas";
      pageSubtitle.textContent = "Dados dos produtos";
      searchInput.style.display = "none";
      contentGrid.className = "content-grid single-grid";

      contentGrid.innerHTML = `
        <section class="card">
          <div class="card-header">
            <div class="card-title">▥ Estatísticas</div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <span>Total de produtos</span>
              <strong>${allProducts.length}</strong>
            </div>

            <div class="stat-card">
              <span>Produtos com imagem</span>
              <strong>${allProducts.filter(p => p.image).length}</strong>
            </div>

            <div class="stat-card">
              <span>Produtos com link</span>
              <strong>${allProducts.filter(p => p.link).length}</strong>
            </div>
          </div>

          <div class="form">
            <p class="hint">Em breve você pode adicionar contagem de cliques, visitas e conversões.</p>
          </div>
        </section>
      `;

      afterPageChange();
    }

    function renderSettings(){
      currentPage = "settings";
      setActivePage("settings");
      pageTitle.textContent = "Configurações";
      pageSubtitle.textContent = "Ajustes do painel";
      searchInput.style.display = "none";
      contentGrid.className = "content-grid single-grid";

      contentGrid.innerHTML = `
        <section class="card">
          <div class="card-header">
            <div class="card-title">⚙ Configurações</div>
          </div>

          <div class="form">
            <div class="field">
              <label>Email administrador</label>
              <input value="${ADMIN_EMAIL}" readonly>
            </div>

            <div class="field">
              <label>Status do painel</label>
              <input value="Conectado ao Firebase" readonly>
            </div>

            <button class="logout" id="settingsLogoutBtn" style="margin-top:8px;">
              Sair da conta
            </button>

            <p class="hint">
              As configurações sensíveis continuam protegidas no firebase.js e nas regras do Firestore.
            </p>
          </div>
        </section>
      `;

      document.getElementById("settingsLogoutBtn").onclick = logoutAdmin;
      afterPageChange();
    }

    function renderStudio(){
  currentPage = "studio";
  setActivePage("studio");
  pageTitle.textContent = "Studio";
  pageSubtitle.textContent = "Crie artes para postar";
  searchInput.style.display = "none";
  contentGrid.className = "content-grid single-grid";

  contentGrid.innerHTML = `
    <section class="card">
      <div class="card-header">
        <div class="card-title">🎨 Zyqen Studio</div>
      </div>

      <div id="studioRoot"></div>
    </section>
  `;

  if(window.initZyqenStudio){
    window.initZyqenStudio(allProducts);
  }

  afterPageChange();
}

    function renderProductsLayout(){
      currentPage = "products";
      setActivePage("products");
      pageTitle.textContent = "Produtos";
      pageSubtitle.textContent = "Gerencie sua página";
      searchInput.style.display = "block";
      contentGrid.className = "content-grid";

      contentGrid.innerHTML = `
        <section class="card">
          <div class="card-header">
            <div class="card-title">▱ Adicionar Produto</div>
          </div>

          <div class="form">
            <div class="field">
              <label>Nome do produto</label>
              <input id="name" placeholder="Ex: iPhone 15 Pro Max">
            </div>

            <div class="field">
              <label>Preço</label>
              <input id="price" placeholder="Ex: 4999.90">
            </div>

            <div class="field">
              <label>Imagem do produto</label>
              <input id="image" placeholder="URL da imagem">
            </div>

            <div class="field">
              <label>Link afiliado</label>
              <input id="link" placeholder="https://exemplo.com/seu-link">
            </div>

            <button class="add" id="addBtn">+ Adicionar Produto</button>

            <div class="hint">
              Produtos novos aparecem automaticamente no topo da lista.
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div class="card-title">
              Produtos Cadastrados
              <span class="badge" id="countBadge">0</span>
            </div>
          </div>

          <div class="products-list" id="products">
            <div class="empty">Carregando produtos...</div>
          </div>
        </section>
      `;

      document.getElementById("addBtn").onclick = addProduct;
      renderProducts(allProducts);
      afterPageChange();
    }

    async function addProduct(){
      const addBtn = document.getElementById("addBtn");

      const name = document.getElementById("name").value.trim();
      const price = document.getElementById("price").value.trim();
      const image = document.getElementById("image").value.trim();
      const link = document.getElementById("link").value.trim();

      if(!name || !price){
        showToast("Preencha nome e preço.");
        return;
      }

      addBtn.disabled = true;
      addBtn.textContent = "Adicionando...";

      try{
        await addDoc(collection(db,"products"),{
          name,
          price,
          image,
          link,
          createdAt: Date.now()
        });

        showToast("Produto adicionado.");
        await loadProducts();

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("image").value = "";
        document.getElementById("link").value = "";

      }catch(error){
        console.error(error);
        showToast("Erro ao adicionar.");
      }

      addBtn.disabled = false;
      addBtn.textContent = "+ Adicionar Produto";
    }

    async function loadProducts(){
      try{
        const q = query(collection(db,"products"), orderBy("createdAt","desc"));
        const snap = await getDocs(q);

        allProducts = [];

        snap.forEach((docItem)=>{
          allProducts.push({
            id: docItem.id,
            ...docItem.data()
          });
        });

        if(currentPage === "products"){
          renderProductsLayout();
        }

      }catch(error){
        console.error(error);
        showToast("Erro ao carregar produtos.");
      }
    }

    function renderProducts(products){
      const productsContainer = document.getElementById("products");
      const countBadge = document.getElementById("countBadge");

      if(!productsContainer || !countBadge) return;

      productsContainer.innerHTML = "";
      countBadge.textContent = products.length;

      if(products.length === 0){
        productsContainer.innerHTML = `<div class="empty">Nenhum produto cadastrado ainda.</div>`;
        return;
      }

      products.forEach((p)=>{
        const div = document.createElement("div");
        div.className = "product";

        const image = p.image || "https://via.placeholder.com/300";
        const name = p.name || "Sem nome";
        const price = p.price || "0";
        const link = p.link || "#";

        div.innerHTML = `
          <img class="thumb" src="${image}" alt="${name}">

          <div>
            <strong>${name}</strong>
            <span>R$ ${price}</span>
            <small>${link}</small>
          </div>

          <div class="product-actions">
            <button class="icon-btn open" title="Abrir produto">↗</button>
            <button class="icon-btn delete" title="Excluir produto">🗑</button>
          </div>
        `;

        div.querySelector(".open").onclick = () => {
          if(link && link !== "#"){
            window.open(link, "_blank");
          }
        };

        div.querySelector(".delete").onclick = async () => {
          const confirmDelete = confirm(`Excluir "${name}"?`);

          if(!confirmDelete) return;

          try{
            await deleteDoc(doc(db,"products",p.id));
            showToast("Produto removido.");
            await loadProducts();
          }catch(error){
            console.error(error);
            showToast("Erro ao remover.");
          }
        };

        productsContainer.appendChild(div);
      });
    }

    searchInput.addEventListener("input", () => {
      const term = searchInput.value.toLowerCase().trim();

      const filtered = allProducts.filter((p) => {
        return String(p.name || "").toLowerCase().includes(term);
      });

      renderProducts(filtered);
    });

    navItems.forEach(item => {
      item.addEventListener("click", () => {
        const page = item.dataset.page;

        if(page === "overview") renderOverview();
        if(page === "products") renderProductsLayout();
        if(page === "studio") renderStudio();
        if(page === "stats") renderStats();
        if(page === "settings") renderSettings();
      });
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user || user.email !== ADMIN_EMAIL) {
        window.location.href = "admin.html";
        return;
      }

      adminEmail.textContent = user.email;
      drawerEmail.textContent = user.email;

      await loadProducts();
      renderProductsLayout();
    });

    async function logoutAdmin(){
      await signOut(auth);
      window.location.href = "admin.html";
    }

    logoutBtn.onclick = logoutAdmin;
    drawerLogoutBtn.onclick = logoutAdmin;

    document.addEventListener("wheel", (e) => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
      }
    }, { passive:false });

    document.addEventListener("keydown", (e) => {
      const blockedKeys = ["+", "-", "=", "0"];

      if ((e.ctrlKey || e.metaKey) && blockedKeys.includes(e.key)) {
        e.preventDefault();
      }
    });

    document.addEventListener("gesturestart", (e) => e.preventDefault());
    document.addEventListener("gesturechange", (e) => e.preventDefault());
    document.addEventListener("gestureend", (e) => e.preventDefault());

    let lastTouchEnd = 0;

    document.addEventListener("touchend", (e) => {
      const now = Date.now();

      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }

      lastTouchEnd = now;
    }, { passive:false });

    let deferredPrompt = null;

    const installBtn = document.getElementById("installBtn");

    if (installBtn) {

      const isIOS =
        /iphone|ipad|ipod/i.test(navigator.userAgent);

      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        navigator.standalone;

      installBtn.style.display = "none";

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();

        deferredPrompt = e;

        if (!isStandalone) {
          installBtn.style.display = "flex";
        }
      });

      if (isIOS && !isStandalone) {
        installBtn.style.display = "flex";
      }

      installBtn.addEventListener("click", async () => {
        if (isIOS) {
          alert(
            "Para instalar:\n\nSafari → Compartilhar → Adicionar à Tela de Início"
          );
          return;
        }

        if (!deferredPrompt) {
          alert("Instalação indisponível no momento.");
          return;
        }

        deferredPrompt.prompt();

        await deferredPrompt.userChoice;

        deferredPrompt = null;
        installBtn.style.display = "none";
      });

      window.addEventListener("appinstalled", () => {
        installBtn.style.display = "none";
      });
    }

    
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>

  
  <script type="module" src="studio.js"></script>

</body>
</html>
